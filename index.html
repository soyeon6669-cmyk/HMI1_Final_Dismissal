    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cream: "#F4F0E6",
              "cream-soft": "#ECE7DA",
              sand: "#E8E2D1",
              ink: "#2A2723",
              "ink-soft": "#6B655B",
              mute: "#A8A296",
              line: "#D9D2C2",
              accent: "#C7B299",

    <style>
      :root {
        --ivory:      #F4F0E6;
        --ivory-soft: #ECE7DA;
        --sand:       #E8E2D1;
        --ink:        #2A2723;
        --ink-soft:   #6B655B;
        --mute:       #A8A296;
        --line:       #D9D2C2;
        --accent:     #C7B299;
        --serif:      'Cormorant Garamond', Georgia, serif;
        --sans:       'Noto Sans KR', system-ui, sans-serif;
      }
      html, body { height: 100%; -webkit-overflow-scrolling: touch; }
      * { box-sizing: border-box; }
      .no-select { -webkit-user-select: none; user-select: none; }
      body {
        font-family: var(--sans);
        font-weight: 300;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }
      .font-serif { font-family: var(--serif); }

      /* ── Experiment overlay ── */
      .exp-overlay {
        position: fixed; inset: 0;
        background: rgba(42,39,35,0.48);
        z-index: 100;
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
        backdrop-filter: blur(4px);
        animation: expFadeIn 0.3s ease forwards;
      }
      @keyframes expFadeIn { from { opacity:0 } to { opacity:1 } }

      /* ── Experiment modal card ── */
      .exp-modal {
        background: var(--ivory);
        max-width: 460px; width: 100%;
        padding: 48px 40px 40px;
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(42,39,35,0.14);
        text-align: center;
        position: relative;
        overflow: hidden;
        animation: expSlideUp 0.38s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      @keyframes expSlideUp {
        from { transform: translateY(18px); opacity:0 }
        to   { transform: translateY(0);    opacity:1 }
      }
      /* 상단 장식 라인 */
      .exp-modal::before {
        content: '';
        position: absolute; top:0; left:0; right:0; height:3px;
        background: linear-gradient(90deg, var(--accent), var(--sand), var(--accent));
      }
      .exp-modal-eyebrow {
        font-family: var(--sans);
        font-size: 10px;
        letter-spacing: 3px;
        color: var(--mute);
        text-transform: uppercase;
        margin-bottom: 14px;
      }
      .exp-modal h2 {
        font-family: var(--serif);
        font-size: 28px; font-weight: 400;
        line-height: 1.25;
        margin-bottom: 18px;
        color: var(--ink);
        letter-spacing: 0.3px;
      }
      .exp-modal p {
        font-size: 13px;
        color: var(--ink-soft);
        line-height: 1.95;
        font-weight: 300;
        font-family: var(--sans);
      }
      .exp-modal .task-box {
        margin: 18px 0;
        padding: 16px 20px;
        background: var(--ivory-soft);
        border-radius: 14px;
        border: 1px solid var(--line);
      }
      .exp-modal .task-label {
        font-size: 10px;
        letter-spacing: 2px;
        color: var(--mute);
        text-transform: uppercase;
        margin-bottom: 6px;
        font-family: var(--sans);
      }
      .exp-modal .task-name {
        font-family: var(--serif);
        font-style: italic;
        font-size: 17px;
        font-weight: 400;
        color: var(--ink);
        line-height: 1.35;
      }
      .exp-divider {
        width: 40px; height: 1px;
        background: var(--line);
        margin: 0 auto 20px;
      }

      /* ── Experiment button ── */
      .exp-btn {
        display: inline-block;
        margin-top: 24px;
        width: 100%;
        padding: 15px 32px;
        background: var(--ink);
        color: var(--ivory);
        font-family: var(--sans);
        font-size: 11px; font-weight: 400;
        letter-spacing: 3px;
        text-transform: uppercase;
        border: none; border-radius: 14px;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.15s;
      }
      .exp-btn:hover  { opacity: 0.82; transform: translateY(-1px); }
      .exp-btn:active { opacity: 0.65; transform: translateY(0); }

      /* ── Task bar ── */
      .exp-task-bar {
        position: fixed; bottom:0; left:0; right:0;
        z-index: 90;
        background: var(--ink);
        color: var(--ivory);
        padding: 16px 24px;
        display: flex; align-items: center; justify-content: center; gap: 12px;
        box-shadow: 0 -4px 20px rgba(42,39,35,0.12);
        font-family: var(--sans);
        font-size: 13px; font-weight: 300;
        letter-spacing: 0.3px;
        animation: barSlideUp 0.35s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      @keyframes barSlideUp {
        from { transform: translateY(100%) }
        to   { transform: translateY(0) }
      }
      .exp-task-bar::before {
        content: '';
        width: 7px; height: 7px;
        background: var(--accent);
        border-radius: 50%;
        flex-shrink: 0;
        animation: dotPulse 1.6s ease infinite;
      }
      @keyframes dotPulse {
        0%, 100% { opacity:1 }
        50%       { opacity:0.3 }
      }
      .exp-task-bar strong {
        font-family: var(--serif);
        font-style: italic;
        font-size: 15px; font-weight: 400;
        color: var(--sand);
      }
    </style>
  </head>

      const DISMISSAL = {
        SCROLL: "scroll",
        SWIPE: "swipe",

        CLOSE_BUTTON: "close_button",
        AUTO: "auto",
      };

      const DISMISSAL_LABEL = {
        [DISMISSAL.SCROLL]: "스크롤",
        [DISMISSAL.SWIPE]: "밀어내기",
        [DISMISSAL.BACKDROP]: "화면 탭",
        [DISMISSAL.CLOSE_BUTTON]: "닫기 버튼",
        [DISMISSAL.AUTO]: "타이머",
      };
      const ALL_DISMISSAL_MODES = [DISMISSAL.SCROLL, DISMISSAL.SWIPE, DISMISSAL.BACKDROP, DISMISSAL.CLOSE_BUTTON, DISMISSAL.AUTO];
      const SURVEY_URL = "https://forms.gle/SR3Ux2drPY6RePSY8";
      // 항상 고정 노출되는 히어로 상품 (과업 제외)
      const HERO_IMAGE_KEYS = ["amelie_bag", "amelie_bag_vintage", "braid_bag"];
      // 과업 상품 키는 App 내부에서 매 실험마다 무작위 5개 선정
      function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
        return a;
      }
      // 상의 → 하의 → 가방·소품 순서를 유지하며 그룹 내 셔플
      // (사람이 나오는 의류 이미지가 항상 그리드 상단에 위치)
      function shuffleByCategory(products) {
        const tops   = products.filter(p => p.shopCategory === "top");
        const bottoms= products.filter(p => p.shopCategory === "bottom");
        const sopum  = products.filter(p => p.shopCategory === "sopum");
        return [
          ...shuffleArray(tops),
          ...shuffleArray(bottoms),
          ...shuffleArray(sopum),
        ].map(p => p.id);
      }
      const SHOP_CATEGORY_LABEL = {
        sopum: "가방·소품",
        top: "상의",
        bottom: "하의",
      };

      function clamp(n, min, max) {
        return Math.max(min, Math.min(max, n));
      }

      function nowMs() {
        return performance && performance.now ? performance.now() : Date.now();
      }

      function formatMs(ms) {
        const s = ms / 1000;
        if (s < 1) return `${Math.round(ms)}ms`;
        return `${s.toFixed(2)}s`;
      }

      function ProductCard({ p, onClick, onCart, onWish, wished }) {

              </button>
              {/* 품절 */}
              {p.soldOut && (

              {/* NEW 배지 */}
              {p.isNew && (
                <div className="absolute top-3 left-3" style={{fontSize:"10px",letterSpacing:"2px",color:"#2A2723",textTransform:"uppercase",fontFamily:"var(--sans)"}}>New</div>
              )}
              {/* 찜 버튼 */}
              <button
                aria-label="찜"
                onClick={(e) => { e.stopPropagation(); onWish(); }}
                className="absolute top-3 right-3 w-8 h-8 flex items-center justify-center transition"
              >
                <svg width="18" height="18" viewBox="0 0 24 24" fill={wished ? "#2A2723" : "none"} stroke="#2A2723" strokeWidth="1.3">
                  <path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 00-7.8 7.8l1.1 1L12 21l7.7-7.6 1.1-1a5.5 5.5 0 000-7.8z"/>
                </svg>
              </button>
              {/* 장바구니 버튼 */}
              <button
                aria-label="장바구니"
                onClick={(e) => { e.stopPropagation(); onCart(); }}
                className="absolute bottom-3 right-3 w-8 h-8 flex items-center justify-center transition opacity-0 group-hover:opacity-100"
              >
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#2A2723" strokeWidth="1.3">
                  <path d="M6 7h12l-1.2 10a2 2 0 01-2 1.7H9.2A2 2 0 017.2 17L6 7z"/>
                  <path d="M9 7V5a3 3 0 016 0v2"/>
                </svg>
              </button>
            </div>
            {/* 상품 정보 */}
            <button onClick={onClick} className="block w-full text-left pt-3 pb-1">
              <div style={{fontSize:"10px",letterSpacing:"1.5px",color:"#A8A296",textTransform:"uppercase",fontFamily:"var(--sans)",marginBottom:"4px"}}>{p.brand}</div>
              <div style={{fontFamily:"var(--sans)",fontSize:"12px",fontWeight:300,color:"#2A2723",lineHeight:1.45}} className="line-clamp-1">{p.title}</div>
              <div className="mt-1 flex items-center gap-2">
                {p.discountPct > 0 && <span style={{fontSize:"11px",color:"#6B655B",textDecoration:"line-through",fontFamily:"var(--sans)"}}>{p.originalPrice}</span>}
                <span style={{fontSize:"12px",fontWeight:400,color:"#2A2723",fontFamily:"var(--sans)"}}>{p.price}</span>
              </div>
            </button>
          </div>
        );
      }

      function ShopTopBar({ view, title, query, setQuery, onSearch, onBack, cartCount, onCart }) {
        return (
          <header className="sticky top-0 z-40 backdrop-blur border-b border-line" style={{background:"rgba(244,240,230,0.96)"}}>
            <div className="mx-auto max-w-[1200px] px-6 py-4 grid grid-cols-3 items-center">
              {/* 왼쪽: 뒤로/메뉴 */}
              <button type="button" onClick={view !== "list" ? onBack : undefined} className="justify-self-start" style={{color:"var(--ink)",opacity:0.75}} aria-label={view !== "list" ? "뒤로" : "메뉴"}>
                {view !== "list" ? (
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
                ) : (
                  <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
                    <path d="M0 1.5h22M0 8h22M0 14.5h14" stroke="currentColor" strokeWidth="1.2"/>
                  </svg>
                )}
              </button>
              {/* 센터: 로고 */}
              <div className="justify-self-center text-center" style={{fontFamily:"var(--serif)",fontSize:"22px",fontWeight:400,letterSpacing:"1px",color:"var(--ink)"}}>
                {view === "detail" || view === "cart" ? (
                  <span style={{fontSize:"14px",letterSpacing:"2px",fontFamily:"var(--sans)",fontWeight:300,textTransform:"uppercase"}}>{title}</span>
                ) : "Dismissal Mall"}
              </div>
              {/* 오른쪽: 장바구니 */}
              <div className="justify-self-end flex items-center gap-4" style={{color:"var(--ink)"}}>
                <button type="button" onClick={onCart} className="relative" style={{opacity:0.65}} aria-label="장바구니">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.3">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                  </svg>
                  {cartCount > 0 && <span className="absolute -top-1.5 -right-1.5 w-4 h-4 rounded-full text-[9px] flex items-center justify-center" style={{background:"var(--accent)",color:"var(--ink)"}}>{cartCount}</span>}
                </button>
              </div>
            </div>
            {/* 검색바 — 하단 우측 정렬 */}
            {view === "list" && (
              <div className="mx-auto max-w-[1200px] px-6 pb-3 border-t border-line/40 flex justify-end">
                <input value={query} onChange={(e) => setQuery(e.target.value)} onKeyDown={(e) => e.key === "Enter" && onSearch()}
                  placeholder="Search..." style={{fontFamily:"var(--serif)",fontStyle:"italic",fontSize:"14px",color:"var(--ink)"}}
                  className="bg-transparent py-2 outline-none placeholder:text-mute border-b border-line w-64" />
              </div>
            )}
          </header>
        );
      }

      function QuantityStepper({ value, onChange, disabled }) {
        return (
          <div className="inline-flex items-center rounded-2xl bg-white ring-1 ring-neutral-200 overflow-hidden">
            <button
              onClick={() => onChange(Math.max(1, value - 1))}
              disabled={disabled}
              className="h-10 w-10 flex items-center justify-center bg-neutral-50 hover:bg-neutral-100 disabled:opacity-40"
              aria-label="수량 감소"
              title="수량 감소"
            >
              −
            </button>
            <div className="px-4 text-sm font-black tabular-nums">{value}</div>
            <button
              onClick={() => onChange(value + 1)}
              disabled={disabled}
              className="h-10 w-10 flex items-center justify-center bg-neutral-50 hover:bg-neutral-100 disabled:opacity-40"
              aria-label="수량 증가"
              title="수량 증가"
            >
              +
            </button>
          </div>
        );
      }

                      : <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px"}}>{p.emoji}</div>

              {/* ── 대형 메인 이미지 ── */}

      // 원형 타이머 컴포넌트 — 팝업 우측 상단 고정
      function CircleTimer({ open, onExpire, onClose }) {
        const TOTAL = 10;
        const RADIUS = 20;
        const CIRC = 2 * Math.PI * RADIUS; // ≈ 125.66

        const [sec, setSec] = React.useState(TOTAL);
        const [done, setDone] = React.useState(false);

        // open 될 때마다 타이머 초기화
        React.useEffect(() => {
          if (!open) return;
          setSec(TOTAL);
          setDone(false);
          const startT = performance.now();
          const id = window.setInterval(() => {
            const elapsed = (performance.now() - startT) / 1000;
            const remaining = Math.max(0, TOTAL - elapsed);
            setSec(remaining);
            if (remaining <= 0) {
              window.clearInterval(id);
              setDone(true);
              onExpire && onExpire();
            }
          }, 50);
          return () => window.clearInterval(id);
        }, [open]);

        // 원형 stroke 계산: 남은 비율만큼만 표시
        const ratio = sec / TOTAL;
        const dash = ratio * CIRC;
        const gap  = CIRC - dash;

        return (
          <div className="relative flex items-center justify-center" style={{ width: done ? 30 : 52, height: done ? 30 : 52 }}>
            {!done ? (
              // 카운트다운 중 — 클릭 불가
              <>
                <svg width="52" height="52" style={{ position: "absolute", top: 0, left: 0, transform: "rotate(-90deg)" }}>
                  {/* 배경 트랙 */}
                  <circle cx="26" cy="26" r={RADIUS} fill="none" stroke="#e5e7eb" strokeWidth="3" />
                  {/* 진행 아크 */}
                  <circle
                    cx="26" cy="26" r={RADIUS}
                    fill="none"
                    stroke="#171717"
                    strokeWidth="3"
                    strokeLinecap="round"
                    strokeDasharray={`${dash} ${gap}`}
                    style={{ transition: "stroke-dasharray 0.1s linear" }}
                  />
                </svg>
                <span className="relative text-sm font-black text-neutral-900 tabular-nums select-none">
                  {Math.ceil(sec)}
                </span>
              </>
            ) : (
              // 0초 도달 — CLOSE_BUTTON 과 동일한 × 버튼
              <button
                onClick={onClose}
                aria-label="닫기"
                style={{
                  width: "30px", height: "30px",
                  borderRadius: "50%",
                  background: "#F4F0E6",
                  border: "none", cursor: "pointer",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: "17px", color: "#2A2723", lineHeight: 1,
                }}
              >×</button>
            )}
          </div>
        );
      }

      function PromoPopup({ open, mode, remainingSec, popupRef, flyStyle, onCloseClick, onGoDetail }) {
        const content = POPUP_CONTENT[mode] || POPUP_CONTENT[DISMISSAL.SCROLL];
        const [visible, setVisible] = React.useState(false);
        const [mounted, setMounted] = React.useState(false);

        React.useEffect(() => {
          if (open) {
            setMounted(true);
            window.requestAnimationFrame(() => {
              window.requestAnimationFrame(() => setVisible(true));
            });
          } else {
            setVisible(false);
            const t = window.setTimeout(() => setMounted(false), 1600);
            return () => window.clearTimeout(t);
          }
        }, [open]);

        if (!mounted) return null;

        const handleBackdropClick = (e) => {

            onCloseClick();

        return (
          <>
            {/* dim */}
            <div
              className="fixed inset-0 z-50"
              style={{
                background: "rgba(42,39,35,0.52)",
                opacity: visible ? 1 : 0,
                transition: "opacity 1.5s ease",
              }}
            />
            {/* centering wrapper — backdrop tap */}
            <div

            if (scheduleTimerRef.current) {

        // (scroll_depth_trigger 가 랜덤 지연을 무시하고 즉시 팝업을 열던 버그 수정)

        useEffect(() => {
          if (!popupOpen) return;
          if (mode !== DISMISSAL.SCROLL) return;

          // 팝업 마운트/애니메이션 중 발생하는 미세 이벤트를 걸러내기 위해
          // 300ms 후에 리스너를 부착 (팝업 등장 애니메이션 1.5s 중 초반 노이즈 방지)
          let lastTouchY = null;
          let attached = false;

          const onScroll = () => {
            // 실제 페이지 스크롤 기준: 팝업 등장 시점보다 10px 이상 내려가야 해제
            const dy = (window.scrollY || 0) - openScrollYRef.current;
            if (dy >= 10) dismissPopup({ reason: "window_scroll" });
          };

          const onTouchMove = (e) => {
            const y = e.touches?.[0]?.clientY;
            if (y == null) return;
            if (lastTouchY != null) {
              // 손가락이 위로 8px 이상 이동 = 아래 방향 스크롤 제스처
              if (lastTouchY - y >= 8) {
                dismissPopup({ reason: "touch_scroll" });
                return;
              }
            }
            lastTouchY = y;
          };

          const onTouchEnd = () => { lastTouchY = null; };

          const attach = () => {
            attached = true;
            // 리스너 부착 시점의 스크롤 위치를 기준으로 재설정
            openScrollYRef.current = window.scrollY || 0;
            window.addEventListener("scroll", onScroll, { passive: true });
            window.addEventListener("touchmove", onTouchMove, { passive: true });
            window.addEventListener("touchend", onTouchEnd, { passive: true });
            window.addEventListener("touchcancel", onTouchEnd, { passive: true });
          };

          const timerId = window.setTimeout(attach, 300);

          return () => {
            window.clearTimeout(timerId);
            if (attached) {
              window.removeEventListener("scroll", onScroll);
              window.removeEventListener("touchmove", onTouchMove);
              window.removeEventListener("touchend", onTouchEnd);
              window.removeEventListener("touchcancel", onTouchEnd);
            }
          };
        }, [popupOpen, mode, dismissPopup]);

        // dismissal: Auto 모드 — CircleTimer가 10초 카운트, 종료 후 X버튼 클릭 시에만 닫힘

        // backdrop/close/auto: global pointerdown capture to classify inside/outside
        useEffect(() => {
          if (!popupOpen) return;
          const onPointerDownCapture = (e) => {
            const rect = popupRef.current?.getBoundingClientRect?.();
            const inside =
              rect &&
              e.clientX >= rect.left &&
              e.clientX <= rect.right &&
              e.clientY >= rect.top &&
              e.clientY <= rect.bottom;

            if (mode === DISMISSAL.BACKDROP) {
              if (!inside) dismissPopup({ reason: "backdrop_tap" });
              else invalid({ type: "content_tap" });
              return;
            }

            if (mode === DISMISSAL.CLOSE_BUTTON) {
              if (!inside) invalid({ type: "backdrop_tap" });
              else invalid({ type: "content_tap" });
              return;
            }

            if (mode === DISMISSAL.AUTO) invalid({ type: "any_click_during_auto" });

          return () => document.removeEventListener("pointerdown", onPointerDownCapture, true);
        }, [popupOpen, mode, dismissPopup, invalid]);

          let start = { x: 0, y: 0 };
          let last = { x: 0, y: 0 };

          const apply = (x, y) => {
            if (!dragging) return;
            const dx = x - start.x;
            const dy = y - start.y;
            last = { x: dx, y: dy };
            const rot = clamp(dx / 16, -14, 14);
            const dist = Math.hypot(dx, dy);
            const opacity = clamp(1 - dist / 520, 0.35, 1);
            setFlyStyle({ x: dx, y: dy, rot, opacity, transitioning: false });
          };
          const finish = () => {
            if (!dragging) return;
            dragging = false;
            const dx = last.x;
            const dy = last.y;
            const dist = Math.hypot(dx, dy);
            if (dist >= threshold) {
              setFlyStyle({
                x: dx * 2.3,
                y: dy * 2.3,
                rot: clamp(dx / 12, -18, 18),
                opacity: 0,
                transitioning: true,
              });

          window.addEventListener("pointercancel", onUp,         { passive: true });

          window.addEventListener("touchmove",     onTouchMove,  { passive: false });
          window.addEventListener("touchend",      onTouchEnd,   { passive: true });
          window.addEventListener("touchcancel",   onTouchEnd,   { passive: true });

            window.removeEventListener("touchmove",     onTouchMove);

        const scheduleBrowsingPopup = useCallback(() => {

          if (!m) return;
          setMode(m); modeRef.current = m;

          // 타이머가 이미 있으면 취소하지 않음(딜레이 리셋 방지) — 최초 1회만 세팅
          if (scheduleTimerRef.current) return;

          popupTrialDoneRef.current = true; // 이번 과업 팝업 스케줄 완료로 표시
          setPopupScheduled(true);

          // 과업별 사전 생성된 딜레이 사용 (5개 구간 각 다른 시간대)
          const delay = trialDelaysRef.current[idx] ?? 20000;
          scheduleTimerRef.current = window.setTimeout(() => {
            scheduleTimerRef.current = null;
            // 이미 팝업이 열려 있거나 과업이 종료된 경우 무시
            if (expPhaseRef.current === "trial_active" && !popupOpenRef.current) {
              openPopup("random_browse");
            }
          }, delay);
        }, [openPopup, popupQueue]);
        const onWelcomeNext = () => { setExpPhase("task_instruction"); expPhaseRef.current = "task_instruction"; };
        const onTaskConfirm = () => {
          // 새 과업 시작: 이전 타이머·플래그 초기화
          if (scheduleTimerRef.current) { window.clearTimeout(scheduleTimerRef.current); scheduleTimerRef.current = null; }
          popupTrialDoneRef.current = false;
          popupDismissedInTrialRef.current = false;
          setPopupScheduled(false);
          setExpPhase("trial_active"); expPhaseRef.current = "trial_active";
          setShowTaskBar(true); setView("list");
          scheduleBrowsingPopup();
        };
        const onCompleteNext = () => {
          const next = trialIndexRef.current + 1;
          if (next >= 5) { setExpPhase("finished"); expPhaseRef.current = "finished"; setShowTaskBar(false);
            log("[scenario_complete]", { trials: 5, order: popupQueue }); return; }
          setTrialIndex(next); trialIndexRef.current = next;
          const nextKey = taskImageKeys[next];
          const nextP = nextKey ? products.find((px) => px.image === nextKey) : null;
          const nextPid = nextP ? String(nextP.id) : null;
          setTargetProductId(nextPid); targetProductIdRef.current = nextPid;
          setExpPhase("task_instruction"); expPhaseRef.current = "task_instruction";
        };

        // 실험 처음부터 다시 시작
        const onRestart = () => {
          // 모든 타이머 정리
          if (scheduleTimerRef.current) { window.clearTimeout(scheduleTimerRef.current); scheduleTimerRef.current = null; }
          log("[experiment_restart]", { fromTrial: trialIndexRef.current });
          // 페이지 새로고침으로 모든 상태 초기화
          window.location.reload();
        };
        useEffect(() => { expPhaseRef.current = expPhase; }, [expPhase]);
        useEffect(() => { trialIndexRef.current = trialIndex; }, [trialIndex]);

        // 초기 비히어로 상품 순서 설정 (상의→하의→소품 그룹 순서 유지)
        useEffect(() => {
          if (nonHeroProducts.length && !shuffledNonHeroIds.length) {
            setShuffledNonHeroIds(shuffleByCategory(nonHeroProducts));
          }
        }, [nonHeroProducts]);
        useEffect(() => { popupQueueRef.current = popupQueue; }, [popupQueue]);
        useEffect(() => { trialDelaysRef.current = trialDelays; }, [trialDelays]);
        useEffect(() => {
          // 이번 과업에서 팝업이 아직 한 번도 스케줄되지 않은 경우에만 시도
          if (
            expPhaseRef.current === "trial_active" &&
            !popupOpenRef.current &&
            !popupScheduled &&
            !popupTrialDoneRef.current
          ) {
            scheduleBrowsingPopup();
          }
        }, [categoryTab, view, scheduleBrowsingPopup]);
        // taskProduct는 trialIndex에서 직접 도출 — targetProductId/Ref는 addToCart 완료 판정용으로만 사용
        useEffect(() => {
          if (products.length) {
            const key = taskImageKeys[trialIndexRef.current];
            const p = key ? products.find((px) => px.image === key) : null;
            const pid = p ? String(p.id) : null;
            setTargetProductId(pid); targetProductIdRef.current = pid;
          }
        }, [products]);
        // 현재 과업 타겟 상품: taskImageKeys[trialIndex]로 찾기
        const taskProduct = useMemo(() => {
          const key = taskImageKeys[trialIndex];
          return key ? products.find((p) => p.image === key) || null : null;
        }, [products, trialIndex]);
        const BLOCKED_PHASES = ["welcome","task_instruction","trial_complete","finished"];
        return (
          <div className={"min-h-screen bg-cream" + (showTaskBar ? " pb-16" : "")}>
            <Toast visible={toast.visible} text={toast.text} />
            <WrongProductAlert
              visible={wrongProductAlert}
              taskTitle={taskProduct ? taskProduct.title : null}
              onClose={() => { setWrongProductAlert(false); setView("list"); }}
            />
            <NotDismissedAlert
              visible={notDismissedAlert}
              onClose={() => {
                setNotDismissedAlert(false);
                setView("list");
                // 대기 중인 타이머 취소 후 팝업 즉시 등장
                if (scheduleTimerRef.current) {
                  window.clearTimeout(scheduleTimerRef.current);
                  scheduleTimerRef.current = null;
                }
                openPopup("forced_after_not_dismissed_alert");
              }}
            />
            <div {...(popupOpen || wrongProductAlert || notDismissedAlert ? { inert: "" } : {})}>
            <ShopTopBar
              view={view}
              title={view === "cart" ? "장바구니" : selectedProduct ? selectedProduct.brand : "상품"}
              query={query}
              setQuery={setQuery}
              onSearch={onSearch}
              onBack={goBack}
              cartCount={cartCount}
              onCart={openCart}
            />

            {view === "list" ? (
              <div className="mx-auto max-w-[1200px] px-4">
                
                <section className="max-w-[1200px] mx-auto px-6 py-16 grid md:grid-cols-2 gap-12 items-center border-b border-line mb-8">
                  <div>
                    <p className="text-[10px] tracking-[0.3em] uppercase text-mute mb-4">2026 SS Collection</p>
                    <h1 className="font-serif text-5xl md:text-6xl leading-[1.05] text-ink"><em className="italic">Reset</em> Routine</h1>
                    <p className="mt-6 text-sm text-mute leading-relaxed max-w-md font-light">부드러운 텍스처와 정제된 실루엣으로 완성한 데일리 루틴. 조용하지만 분명한 스타일을 만나보세요.</p>
                    <button type="button" className="mt-8 text-[11px] tracking-[0.2em] uppercase border-b border-ink pb-1 text-ink">Shop New In →</button>
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    {heroProducts.map((p) => (
                      <button key={p.image} type="button" onClick={() => openDetail(p)} className="text-left">
                        <div className="aspect-[3/4] bg-[#ebe8e1] overflow-hidden mb-3">
                          {p.image ? <img src={IMG[p.image]} alt={p.title} className="w-full h-full object-cover" /> : null}
                        </div>
                        <p className="font-serif text-[11px] text-ink text-center line-clamp-2">{p.title}</p>
                      </button>
                    ))}
                  </div>
                </section>

                <div className="text-center py-12">
                  <h2 className="font-serif text-3xl text-ink">Best <em className="italic">Seller</em></h2>
                  <p className="text-[11px] tracking-[0.15em] text-mute mt-2 uppercase">See Our Signature Pieces</p>
                </div>
                <CategoryBar
                  active={categoryTab}
                  counts={categoryCounts}
                  onSelect={(id) => {
                    setCategoryTab(id);
                    log("[ui_category]", { category: id });
                  }}
                />
                <div className="pt-4 pb-2">
                  <div className="flex items-center justify-between gap-3">
                    <div style={{fontFamily:"var(--sans)",fontSize:"11px",letterSpacing:"0.08em",color:"var(--ink-soft)"}}>
                      총 <span style={{color:"var(--ink)",fontWeight:400}}>{visibleProducts.length}</span>개
                    </div>
                    <div className="flex items-center gap-2">
                      <div style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
                        <select
                          value={sort}
                          onChange={(e) => (setSort(e.target.value), log("[ui_sort]", { sort: e.target.value }))}
                          style={{
                            fontFamily:"var(--sans)",fontSize:"10px",letterSpacing:"0.1em",
                            color:"var(--ink-soft)",background:"transparent",
                            border:"1px solid var(--line)",borderRadius:"8px",
                            padding:"6px 28px 6px 12px",outline:"none",cursor:"pointer",
                            appearance:"none",WebkitAppearance:"none",
                          }}
                        >
                          <option value="accuracy">정확도순</option>
                          <option value="rating">평점순</option>
                          <option value="price_asc">낮은가격순</option>
                        </select>
                        {/* 커스텀 드롭다운 화살표 */}
                        <svg style={{position:"absolute",right:"9px",pointerEvents:"none"}} width="9" height="9" viewBox="0 0 10 10" fill="none">
                          <path d="M2 3.5L5 6.5L8 3.5" stroke="var(--mute)" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      </div>
                      <button
                        style={{fontFamily:"var(--sans)",fontSize:"10px",letterSpacing:"0.1em",color:"var(--ink-soft)",border:"1px solid var(--line)",borderRadius:"8px",padding:"6px 12px",background:"transparent",cursor:"pointer",textTransform:"uppercase"}}
                        onClick={() => {
                          setQuery("");
                          setSort("accuracy");
                          setExcludeSoldOut(true);
                          setIncludeReviewOnly(false);
                          setExcludeLowQuality(false);
                          setCategoryTab("all");
                          log("[ui_click]", { type: "reset_filters" });
                        }}
                      >
                        초기화
                      </button>
                    </div>
                  </div>

                  <div className="mt-3 flex flex-wrap items-center gap-x-5 gap-y-2" style={{paddingBottom:"4px"}}>
                    {[
                      { key: "includeReviewOnly", label: "후기상품", checked: includeReviewOnly, set: setIncludeReviewOnly },
                      { key: "excludeSoldOut",    label: "품절 제외", checked: excludeSoldOut,    set: setExcludeSoldOut },
                      { key: "excludeLowQuality", label: "저평점 제외", checked: excludeLowQuality, set: setExcludeLowQuality },
                    ].map(({ key, label, checked, set }) => (
                      <label key={key} className="flex items-center gap-1.5 cursor-pointer" style={{fontFamily:"var(--sans)",fontSize:"11px",letterSpacing:"0.04em",color: checked ? "var(--ink)" : "var(--mute)"}}>
                        <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:"14px",height:"14px",border:`1px solid ${checked?"var(--ink)":"var(--line)"}`,borderRadius:"3px",background: checked ? "var(--ink)" : "transparent",transition:"all 0.15s",flexShrink:0}}>
                          {checked && <svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6 8 1" stroke="#F4F0E6" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                        </span>
                        <input type="checkbox" checked={checked} onChange={(e) => (set(e.target.checked), log("[ui_filter]", { [key]: e.target.checked }))} className="sr-only" />
                        {label}
                      </label>
                    ))}
                  </div>
                </div>

                <div className="pb-32 grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-8">
                  {visibleProducts.map((p, i) => (
                    <ProductCard
                      key={p.id}
                      p={p}
                      wished={!!wishMap[p.id]}
                      onClick={() => (log("[product_click]", { id: p.id, index: i, brand: p.brand, title: p.title }), openDetail(p))}
                      onCart={() => addToCart(p.id, 1)}
                      onWish={() => toggleWish(p.id)}
                    />
                  ))}
                </div>
              </div>
            ) : view === "cart" ? (
              <CartPage
                items={cartItems}
                productsById={productsById}
                onClose={() => (setView("list"), log("[navigate]", { to: "list_from_cart" }))}
                onChangeQty={changeCartQty}
                onRemove={removeFromCart}
                onCheckout={checkout}
                onGoDetail={(p) => openDetail(p)}
              />
            ) : selectedProduct ? (
              <ProductDetail
                p={selectedProduct}
                qty={detailQty}
                setQty={setDetailQty}
                wished={!!wishMap[selectedProduct.id]}
                selectedOption={optionMap[selectedProduct.id] || "기본"}
                onSelectOption={(option) => selectOption(selectedProduct.id, option)}
                onWish={() => toggleWish(selectedProduct.id)}
                onAddToCart={() => addToCart(selectedProduct.id, detailQty)}
                onBuy={() => buyNow(selectedProduct.id, detailQty)}
              />
            ) : (
              <div className="mx-auto max-w-[980px] px-4 py-10 text-sm text-neutral-600">상품을 찾을 수 없습니다.</div>
            )}

            </div>{/* end inert wrapper */}

            <ExperimentModals phase={expPhase} trialIndex={trialIndex} taskProduct={taskProduct}
              onWelcomeNext={onWelcomeNext} onTaskConfirm={onTaskConfirm} onCompleteNext={onCompleteNext}
              onRestart={onRestart} showTaskBar={showTaskBar} />

            <PromoPopup
              open={popupOpen}
              mode={mode}
              remainingSec={mode === DISMISSAL.AUTO ? autoProgress : 0}
              popupRef={popupRef}
              flyStyle={flyStyle}
              onCloseClick={onCloseClick}
              onGoDetail={(imageKey) => {
                const found = products.find((p) => p.image === imageKey);
                if (found) openDetail(found);
              }}
            />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
